<!DOCTYPE html>

<html>

<head>

    <title>Admin Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Admin Login</h1>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">

                Login

            </button>

        </form>

    </div>

</div>

</body>

</html>
