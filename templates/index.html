{% extends "base.html" %}

{% block title %}
MovieHub AI
{% endblock %}

{% block content %}

<section class="hero">

    <h1>Discover Your Next Favorite Movie</h1>

    <p>AI Powered Movie Recommendation Platform</p>

    <form action="/search" method="GET" class="search-box">

        <input
            type="text"
            name="movie"
            placeholder="Search Movies..."
            required>

        <button type="submit">
            Search
        </button>

    </form>

</section>

<section class="movies-section">

    <h2>🎥 Popular Movies</h2>

    <div class="movie-grid">

        {% for movie in popular %}

       <a href="/movie/{{ movie['imdb_id'] }}" class="movie-link">
        <div class="movie-card">
            <img src="{{ movie.poster }}" alt="{{ movie.title }}">
            <h3>{{ movie.title }}</h3>
        </div>
    </a>
        {% endfor %}

    </div>

</section>

{% endblock %}
